name: Cyber-Snake-Animation

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate Cyber Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            animations/github-snake-dark.svg?color_snake=#ff003c&color_dots=#161b22,#4a0000,#b30000,#ff003c,#ff4d79
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add animations/
          if git commit -m "Generate Cyber Snake Animation"; then
            git push
          fi
